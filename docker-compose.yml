services:
  postgres:
    image: postgres:16
    container_name: quit-interview-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: quit_interview
    ports:
      - "5432:5432"
    volumes:
      - quit_interview_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quit_interview"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  quit_interview_pg_data:
